<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">

  <defs>
    <!-- Sombras suaves -->
    <linearGradient id="skinShade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffd9c9"/>
      <stop offset="100%" stop-color="#f5bfae"/>
    </linearGradient>

    <linearGradient id="chairGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9c6d0"/>
      <stop offset="100%" stop-color="#f39fb0"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="800" height="800" fill="#f4f4f4"/>

  <!-- Silla -->
  <rect x="100" y="460" width="600" height="260" rx="70"
        fill="url(#chairGrad)" stroke="#222" stroke-width="6"/>

  <!-- Brazos -->
  <ellipse cx="250" cy="430" rx="65" ry="100"
           fill="url(#skinShade)" stroke="#222" stroke-width="6"/>
  <ellipse cx="550" cy="430" rx="65" ry="100"
           fill="url(#skinShade)" stroke="#222" stroke-width="6"/>

  <!-- Cuerpo -->
  <rect x="330" y="430" width="140" height="170" rx="50"
        fill="#c7d4ff" stroke="#222" stroke-width="6"/>

  <!-- Tirantes -->
  <rect x="345" y="430" width="30" height="170" fill="#b0c4ff"/>
  <rect x="425" y="430" width="30" height="170" fill="#b0c4ff"/>

  <!-- Cabeza -->
  <circle cx="400" cy="320" r="155"
          fill="url(#skinShade)" stroke="#222" stroke-width="6"/>

  <!-- Mejillas -->
  <circle cx="330" cy="360" r="25" fill="#ffb3b3" opacity="0.4"/>
  <circle cx="470" cy="360" r="25" fill="#ffb3b3" opacity="0.4"/>

  <!-- Cabello base -->
  <path d="M250 270 Q400 150 550 270 Q530 200 400 180 Q270 200 250 270"
        fill="#2a1d1b"/>

  <!-- Flequillo -->
  <path d="M360 230 Q380 290 340 300" fill="#2a1d1b"/>
  <path d="M440 230 Q420 290 460 300" fill="#2a1d1b"/>

  <!-- Ojos -->
  <ellipse cx="350" cy="325" rx="28" ry="35" fill="#1a1a1a"/>
  <ellipse cx="450" cy="325" rx="28" ry="35" fill="#1a1a1a"/>
  <circle cx="340" cy="315" r="10" fill="white"/>
  <circle cx="440" cy="315" r="10" fill="white"/>

  <!-- Nariz sutil -->
  <path d="M400 330 Q395 355 405 355" stroke="#e3a899"
        stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Boca -->
  <path d="M360 385 Q400 420 440 385"
        stroke="#c96a6a" stroke-width="7"
        fill="none" stroke-linecap="round"/>

  <!-- Flores detalladas -->
  <g stroke="#222" stroke-width="4">
    <g transform="translate(280,230)">
      <circle r="25" fill="#ff5c8a"/>
      <circle cx="0" cy="-30" r="20" fill="#ff5c8a"/>
      <circle cx="25" cy="-10" r="20" fill="#ff5c8a"/>
      <circle cx="-25" cy="-10" r="20" fill="#ff5c8a"/>
    </g>

    <g transform="translate(350,200)">
      <circle r="30" fill="#ff8fab"/>
      <circle cx="0" cy="-35" r="25" fill="#ff8fab"/>
      <circle cx="30" cy="-10" r="25" fill="#ff8fab"/>
      <circle cx="-30" cy="-10" r="25" fill="#ff8fab"/>
    </g>

    <g transform="translate(420,185)">
      <circle r="35" fill="#ffd166"/>
      <circle cx="0" cy="-40" r="28" fill="#ffd166"/>
      <circle cx="35" cy="-10" r="28" fill="#ffd166"/>
      <circle cx="-35" cy="-10" r="28" fill="#ffd166"/>
    </g>

    <g transform="translate(490,210)">
      <circle r="28" fill="#ff8fab"/>
      <circle cx="0" cy="-30" r="22" fill="#ff8fab"/>
      <circle cx="28" cy="-10" r="22" fill="#ff8fab"/>
      <circle cx="-28" cy="-10" r="22" fill="#ff8fab"/>
    </g>

    <g transform="translate(550,240)">
      <circle r="25" fill="#ff914d"/>
      <circle cx="0" cy="-28" r="20" fill="#ff914d"/>
      <circle cx="25" cy="-10" r="20" fill="#ff914d"/>
      <circle cx="-25" cy="-10" r="20" fill="#ff914d"/>
    </g>
  </g>

</svg>